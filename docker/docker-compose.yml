version: '3.8'

# Backend runs locally (node server.js) — only n8n is containerised.
# n8n reaches the local backend via http://host.docker.internal:3000

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara2025
      - GENERIC_TIMEZONE=America/Denver
    volumes:
      - n8n_data:/home/node/.n8n
      - ../workflows:/home/node/workflows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  n8n_data: