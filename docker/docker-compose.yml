version: '3.8'

services:
  clara:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: clara_automation
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    volumes:
      - ../inputs:/app/inputs
      - ../outputs:/app/outputs
      - ../changelog:/app/changelog
    working_dir: /app
    command: ["node", "server.js"]
    restart: unless-stopped
    networks:
      - clara_net

  n8n:
    image: n8nio/n8n:latest
    container_name: clara_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara2025
      - GENERIC_TIMEZONE=America/Denver
    volumes:
      - n8n_data:/home/node/.n8n
      - ../workflows:/home/node/workflows
    restart: unless-stopped
    networks:
      - clara_net

networks:
  clara_net:
    driver: bridge

volumes:
  n8n_data: